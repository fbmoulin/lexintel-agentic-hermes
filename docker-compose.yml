services:
  # Apoio futuro para a fase de RAG real.
  # A v0.1 do Lex Kratos Agentic Core não depende deste container.
  qdrant:
    # Pinned for reproducibility (aligns with qdrant-client 1.14.x). Avoid :latest.
    image: qdrant/qdrant:v1.14.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
